name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Community release smoke
        run: node scripts/run-tests.mjs tests/communityReleaseSmoke.test.ts

      - name: Verify plugin
        run: npm run verify

      - name: Check release package
        run: node scripts/package-plugin.mjs --check
