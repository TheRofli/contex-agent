name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Community release smoke
        run: node scripts/run-tests.mjs tests/communityReleaseSmoke.test.ts

      - name: Verify
        run: npm run verify

      - name: Build Rust sidecar
        run: npm run core:build

      - name: Install Rust sidecar
        run: npm run core:install

      - name: Package plugin
        run: npm run package

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist/mindo/* -DestinationPath "release/mindo-$version.zip" -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mindo/manifest.json
            dist/mindo/main.js
            dist/mindo/styles.css
            release/mindo-${{ github.ref_name }}.zip
            dist/mindo-release.json
          draft: false
          generate_release_notes: true
